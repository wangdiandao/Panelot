<!doctype html>
<html>
  <body>
    <h1>Deep controls</h1>
    <closed-control></closed-control>
    <script>
      customElements.define(
        'closed-control',
        class extends HTMLElement {
          constructor() {
            super();
            const root = this.attachShadow({ mode: 'closed' });
            const button = document.createElement('button');
            button.textContent = 'Closed action';
            button.addEventListener('click', () => document.body.setAttribute('data-clicked', 'yes'));
            root.append(button);
          }
        },
      );
    </script>
  </body>
</html>
