<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Panelot icon: a single "P" letterform on the indigo brand color
       (primary #4f46e5; gradient stays inside the indigo ramp).
       Round-capped stroke, optically centered, reads at 16px. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>
  <path d="M41 94 V34 H65 a22 22 0 0 1 0 44 H41"
        fill="none" stroke="#ffffff" stroke-width="18"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
