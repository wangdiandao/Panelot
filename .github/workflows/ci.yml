name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20.12.2
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm compile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
      - run: pnpm budget
      - run: pnpm build:edge
      - run: pnpm zip
      - run: pnpm zip:edge
      - run: pnpm zip:smoke -- dist/panelot-*-chrome.zip dist/panelot-*-edge.zip
      - uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: dist/panelot-0.2.0-*.zip
          if-no-files-found: error

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20.12.2
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error
          retention-days: 30
