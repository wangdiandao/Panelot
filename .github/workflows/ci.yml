name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.12.3
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Read package version
        run: node -e "process.stdout.write('VERSION=' + require('./package.json').version + '\n')" >> "$GITHUB_ENV"
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm compile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
      - run: pnpm budget
      - run: pnpm build:edge
      - run: pnpm zip
      - run: pnpm zip:edge
      - run: pnpm zip:smoke -- "dist/panelot-${VERSION}-chrome.zip" "dist/panelot-${VERSION}-edge.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: extension-packages
          path: |
            dist/panelot-${{ env.VERSION }}-chrome.zip
            dist/panelot-${{ env.VERSION }}-edge.zip
          if-no-files-found: error

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.12.3
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error
          retention-days: 30
