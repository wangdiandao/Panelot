name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.12.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Read package version
        run: node -e "process.stdout.write('VERSION=' + require('./package.json').version + '\n')" >> "$GITHUB_ENV"
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm compile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
      - run: pnpm budget
      - run: pnpm build:edge
      - run: pnpm zip
      - run: pnpm zip:edge
      - run: pnpm zip:smoke -- "dist/panelot-${VERSION}-chrome.zip" "dist/panelot-${VERSION}-edge.zip"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: extension-packages
          path: |
            dist/panelot-${{ env.VERSION }}-chrome.zip
            dist/panelot-${{ env.VERSION }}-edge.zip
          if-no-files-found: error

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.12.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error
          retention-days: 30
