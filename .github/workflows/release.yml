name: Release

on:
  push:
    tags: ['v*']

permissions: {}

jobs:
  release:
    permissions:
      actions: read
      contents: write
    environment:
      name: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify tag commit is on main and passed CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags origin main
          release_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          git merge-base --is-ancestor "$release_commit" origin/main
          ci_run_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?branch=main&head_sha=${release_commit}&status=success&per_page=100" --jq '.workflow_runs | map(select(.event == "push" and .head_branch == "main" and .conclusion == "success")) | first | .id // empty')"
          if [ -z "$ci_run_id" ]; then
            echo "No successful main CI run found for ${release_commit}" >&2
            exit 1
          fi
          echo "Verified successful CI run ${ci_run_id}"
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.12.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Read package version
        run: node -e "process.stdout.write('VERSION=' + require('./package.json').version + '\n')" >> "$GITHUB_ENV"
      - name: Verify tag matches package version
        run: test "${GITHUB_REF_NAME}" = "v${VERSION}"
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm compile
      - run: pnpm test:coverage
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
      - run: pnpm zip
      - run: pnpm budget
      - run: pnpm zip:edge
      - run: pnpm zip:smoke -- "dist/panelot-${VERSION}-chrome.zip" "dist/panelot-${VERSION}-edge.zip"
      - name: Collect release packages
        run: |
          mkdir release
          cp "dist/panelot-${VERSION}-chrome.zip" release/
          cp "dist/panelot-${VERSION}-edge.zip" release/
      - name: Generate Chrome artifact SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: release/panelot-${{ env.VERSION }}-chrome.zip
          format: cyclonedx-json
          output-file: release/panelot-${{ env.VERSION }}-chrome.cdx.json
          dependency-snapshot: false
          upload-artifact: false
          upload-release-assets: false
      - name: Generate Edge artifact SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: release/panelot-${{ env.VERSION }}-edge.zip
          format: cyclonedx-json
          output-file: release/panelot-${{ env.VERSION }}-edge.cdx.json
          dependency-snapshot: false
          upload-artifact: false
          upload-release-assets: false
      - name: Record artifact and SBOM digests
        run: |
          cd release
          sha256sum *.zip *.cdx.json > SHA256SUMS.txt
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes --title "Panelot $GITHUB_REF_NAME"
